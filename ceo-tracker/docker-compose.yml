services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ceo_tracker_db
      POSTGRES_USER: ceo_tracker
      POSTGRES_PASSWORD: ceo_tracker_pwd
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ceo_tracker_db
      SPRING_DATASOURCE_USERNAME: ceo_tracker
      SPRING_DATASOURCE_PASSWORD: ceo_tracker_pwd
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
