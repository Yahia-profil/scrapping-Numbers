<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casablanca Annuaire Entreprises</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Casablanca Annuaire Entreprises</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/stats" class="btn btn-outline-light btn-sm me-2">Statistiques</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-3 align-items-center">
        <div class="col-auto">
            <h5 class="mb-0">Contacts : <span class="badge bg-primary" th:text="${total}">0</span></h5>
        </div>
        <div class="col-auto">
            <form method="get" action="/" class="row g-2 align-items-center">
                <div class="col-auto">
                    <select name="ville" class="form-select form-select-sm" onchange="this.form.submit()">
                        <option value="TOUTES" th:selected="${ville == 'TOUTES'}">Toutes les villes</option>
                        <option th:each="v : ${villes}" th:value="${v}" th:text="${v}" th:selected="${ville == v}"></option>
                    </select>
                </div>
                <div class="col-auto">
                    <a th:href="'/export/csv?ville=' + ${ville}" class="btn btn-success btn-sm">Export CSV</a>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Entreprise</th>
                    <th>Contact</th>
                    <th>Fonction</th>
                    <th>GSM</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="contact : ${contacts}">
                    <td th:text="${contact.companyName}">---</td>
                    <td th:text="${contact.ceoName} ?: '-'">---</td>
                    <td th:text="${contact.jobTitle} ?: '-'">---</td>
                    <td>
                        <span th:text="${contact.phoneNumber}">---</span>
                        <a th:href="'tel:' + ${contact.phoneNumber}" class="btn btn-sm btn-outline-primary ms-1">&#x1F4DE;</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(contacts)}">
                    <td colspan="4" class="text-center text-muted py-4">
                        Aucun contact trouv\u00e9 pour cette ville.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
