<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques - Casablanca Annuaire Entreprises</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Casablanca Annuaire Entreprises</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/stats" class="btn btn-outline-light btn-sm me-2">Statistiques</a>
        </div>
    </div>
</nav>

<div class="container">
    <h4 class="mb-4">Statistiques</h4>

    <div class="card mt-4">
        <div class="card-body text-center">
            <h5>Total des contacts</h5>
            <p class="display-1" th:text="${total}">0</p>
        </div>
    </div>

    <div class="mt-3">
        <a href="/" class="btn btn-primary">Retour au Dashboard</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
